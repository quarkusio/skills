# ─────────────────────────────────────────────────────────────────────────────
# SECTION 12 — MIGRATION STRATEGY
# ─────────────────────────────────────────────────────────────────────────────
migration_strategy:
  service_layer: application-scoped-cdi
  repository_layer: null          # *** USER DECISION REQUIRED ***
                                  # panache-repository | hibernate-orm-standard
  messaging_transport: null       # *** USER DECISION REQUIRED ***
                                  # kafka | amqp | artemis-jms | in-memory | none
  async_strategy: mutiny-uni      # mutiny-uni | cdi-asynchronous
  persistence: null               # *** SET BY PLANNING AGENT ***
                                  # hibernate-orm-panache | hibernate-orm
  view_layer: null                # *** USER DECISION REQUIRED (only if views detected) ***
                                  # qute        — migrate all views to Qute (recommended)
                                  # myfaces     — maintain JSF with Quarkus MyFaces
                                  # auto        — let agent decide based on file count

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 13 — MIGRATION PHASES
# ─────────────────────────────────────────────────────────────────────────────
phases:
  - phase: 0
    name: "Environment Preparation"
    agent: null
    enabled: true
    tasks:
      - Verify Java >= 17
      - Verify Maven >= 3.9
      - Kill lingering processes
      - Write migration-context.json

  - phase: 1
    name: "Project Setup & Bootstrap"
    agent: "agents/03-project-bootstrap.prompt.md"
    enabled: true
    tasks:
      - Create pom.xml with Quarkus BOM
      - Create application.properties skeleton
      - Set up directory structure

  - phase: 5
    name: "Persistence Migration"
    agent: "agents/05-persistence-migration.prompt.md"
    enabled: true
    tasks:
      - Migrate @Entity classes
      - Convert Spring Data repositories
      - Update @Transactional imports
      - Convert application.properties datasource config

  - phase: 6
    name: "Service Layer Migration"
    agent: "agents/06-service-migration.prompt.md"
    enabled: null
    tasks:
      - Convert @Service to @ApplicationScoped
      - Replace @Autowired with @Inject
      - Replace @Value with @ConfigProperty
      - Handle @Async methods

  - phase: 7
    name: "Messaging Migration"
    agent: "agents/07-messaging-migration.prompt.md"
    enabled: null
    tasks:
      - Convert @KafkaListener to @Incoming
      - Convert KafkaTemplate to @Channel Emitter
      - Configure messaging in application.properties

  - phase: 8
    name: "Web Layer Migration"
    agent: "agents/08-web-layer-migration.prompt.md"
    enabled: true
    tasks:
      - Convert @RestController to @Path
      - Convert HTTP method annotations
      - Convert parameter annotations
      - Handle exception handlers

  - phase: 9
    name: "Configuration Migration"
    agent: "agents/09-configuration.prompt.md"
    enabled: true
    tasks:
      - Convert application.properties
      - Convert @Configuration to CDI @Produces
      - Create lifecycle hooks
      - Create Dockerfile

  - phase: 11
    name: "Validation"
    agent: "agents/11-validation.prompt.md"
    enabled: true
    tasks:
      - Run mvn compile
      - Run mvn package
      - Start application
      - Run smoke tests

