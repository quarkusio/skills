# migration-spec.yaml — Canonical Migration Specification for Spring Boot → Quarkus
# Generated by: agents/02-migration-planning.prompt.md
# Schema version: 1.0
# This file is the binding contract between all migration agents.
#
# RULES:
#   - Populate every field. Use null only where no evidence was found in source code.
#   - Boolean detected_features flags drive which phases are active — never leave them null.
#   - Fields marked *** USER DECISION REQUIRED *** must be confirmed before agents proceed.
#   - The phases[] array controls execution order; tasks[] are delegated to sub-agents.
#   - decisions[] captures architectural choices made during planning for traceability.
#   - skip[] documents explicitly excluded scope — never skip silently.

