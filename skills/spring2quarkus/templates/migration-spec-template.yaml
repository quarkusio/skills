approval_policy:
  require_user_acceptance_after_each_phase: true
  max_compile_fix_retries_per_file: 3
  on_manual_review_required: pause-and-ask

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 17 — VERIFICATION RULES
# ─────────────────────────────────────────────────────────────────────────────
verification_rules:
  project-setup:
    - "pom.xml exists"
    - "application.properties exists"
    - "quarkus-maven-plugin is present"
    - "quarkus extensions match detected features"
    - "src/main/java directory exists"
    - "mvn compile succeeds"

